name: IaC-Dockerfile

on:
  workflow_dispatch:     
  pull_request:
  push:
    branches: [ master ]

jobs:
  build:
    runs-on: self-hosted

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Generate Dockerfile dynamically
      run: |
        cat << 'EOF' > Dockerfile.${{ github.run_id }}
        FROM nginx
        RUN apt-get update
        COPY . /usr/share/nginx/html    
        EXPOSE 80
        EOF
  
        echo "生成的 Dockerfile 内容:"
        cat Dockerfile.${{ github.run_id }}
                
    - name: CICD Scan
      run: |
        docker run --rm -v ${{ github.workspace }}:/home/test ccr.ccs.tencentyun.com/yunjing_agent/cicdscanner:5.3.0.36 --token=1c091b05-3584-471b-b551-cdfc96a4dad4 --task iac --iacPath /home/test/Dockerfile.${{ github.run_id }} --debugMode=true
